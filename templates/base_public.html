<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quadri Institute of Technology{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --brand-primary: #1A73E8;
            --brand-primary-dark: #1558B0;
            --brand-primary-light: #D2E3FC;
            --bg-page: #F4F6F9;
            --bg-surface: #FFFFFF;
            --border-color: #DEE2E6;
            --text-muted-custom: #6C757D;
            --text-body: #212529;
        }

        [data-bs-theme="dark"] {
            --bg-page: #121212;
            --bg-surface: #1E1E2D;
            --border-color: #2D2D3F;
            --text-body: #E0E0E0;
            --text-muted-custom: #9E9E9E;
        }

        * {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            background-image: linear-gradient(135deg, var(--bg-page) 0%, var(--brand-primary-light) 100%);
            color: var(--text-body);
            font-size: 14px;
            line-height: 1.6;
        }

        [data-bs-theme="dark"] body {
            --brand-primary-light: #1A3A5C;
        }

        .public-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
        }

        .btn-brand {
            background-color: var(--brand-primary);
            border: none;
            color: #fff;
            font-weight: 500;
            border-radius: 8px;
            padding: 0.55rem 1.5rem;
            transition: background-color 0.2s ease;
        }

        .btn-brand:hover {
            background-color: var(--brand-primary-dark);
            color: #fff;
        }

        .form-control:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 0.2rem var(--brand-primary-light);
        }

        .alert {
            font-size: 14px;
        }

        #theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.3rem 0.6rem;
            color: var(--text-body);
            cursor: pointer;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body>

    <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999;">
        <button id="theme-toggle" title="Toggle dark mode">
            <i class="bi bi-moon-fill" id="theme-icon"></i>
        </button>
    </div>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        (function () {
            var saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', saved);
            document.getElementById('theme-icon').className =
                saved === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        })();

        document.getElementById('theme-toggle').addEventListener('click', function () {
            var current = document.documentElement.getAttribute('data-bs-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-icon').className =
                next === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        });

        setTimeout(function () {
            document.querySelectorAll('.alert.auto-dismiss').forEach(function (el) {
                var bsAlert = bootstrap.Alert.getOrCreateInstance(el);
                bsAlert.close();
            });
        }, 4000);
    </script>

    {% block extra_scripts %}{% endblock %}
</body>

</html>
